      const snapshot = {};
      getAnswerInputs().forEach(el => { if (el.id) snapshot[el.id] = el.value || ""; });
      return snapshot;
    }
    function applyInputSnapshot(snapshot) {
      getAnswerInputs().forEach(el => {
        if (!el.id) return;
        el.value = snapshot && Object.prototype.hasOwnProperty.call(snapshot, el.id) ? (snapshot[el.id] ?? "") : "";
      });
    }
    function normalizeVisitedPages(value) {
      if (!Array.isArray(value)) return [];
      return Array.from(new Set(value.map(v => Number(v)).filter(v => Number.isInteger(v) && v >= 1 && v <= totalProgressPages))).sort((a, b) => a - b);
    }
    function getSubPageStatusSnapshot() { return {4:!!subPageStatus[4],5:!!subPageStatus[5],6:!!subPageStatus[6],7:!!subPageStatus[7],8:!!subPageStatus[8],9:!!subPageStatus[9],10:!!subPageStatus[10],11:!!subPageStatus[11]}; }

      Object.keys(subPageStatus).forEach(key => { subPageStatus[key] = !!(snapshot && snapshot[key]); });
      updateSubPageBoxesFromStatus();
    }
    function buildProgressPayload() {
      const viewer = document.getElementById("pdfViewer");
      return {
        playerName: authUsername,
        currentPage,
        currentIsSubPage,
        visitedPages: normalizeVisitedPages(visitedPages),
        subPageStatus: getSubPageStatusSnapshot(),
        currentPdfUrl,
        currentPdfRole,
        pdfScrollTop: viewer ? viewer.scrollTop : 0,
        inputValues: getInputSnapshot()
      };
    }
    async function applyProgressPayload(payload) {
      isApplyingRemoteData = true;
      const safe = payload && typeof payload === "object" ? payload : {};
      applyInputSnapshot(safe.inputValues || {});
      visitedPages = normalizeVisitedPages(safe.visitedPages || []);
      applySubPageStatusSnapshot(safe.subPageStatus || {});
      currentPage = Number.isInteger(Number(safe.currentPage)) ? Number(safe.currentPage) : 1;
      if (currentPage < 1 || currentPage > totalProgressPages) currentPage = 1;
      currentIsSubPage = !!safe.currentIsSubPage;
      if (currentIsSubPage && !subPages.includes(currentPage)) currentIsSubPage = false;
      if (!currentIsSubPage && !mainPages.includes(currentPage)) currentPage = 1;
      currentPdfUrl = String(safe.currentPdfUrl || "");
      currentPdfRole = String(safe.currentPdfRole || "");
      pdfScrollTop = Number.isFinite(Number(safe.pdfScrollTop)) ? Number(safe.pdfScrollTop) : 0;
      renderView(currentPage, currentIsSubPage, false);
      if (currentPdfUrl) {
        try { await renderPdfIntoSecondCanvas(currentPdfUrl, currentPdfRole, true); } catch (err) { console.error(err); }
      } else {
        exitPdfMode();
      }
      isApplyingRemoteData = false;

    async function apiFetch(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (authToken) headers.Authorization = "Bearer " + authToken;
      const response = await fetch(WORKER_BASE_URL + path, { method: options.method || "GET", headers, body: options.body });
      const json = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(json.error || "Request failed");
      return json;
    }
    async function registerUser() {
      const usernameInput = document.getElementById("auth-username");
      const passwordInput = document.getElementById("auth-password");
      const rawUsername = usernameInput.value || "";
      const username = rawUsername.trim().toLowerCase();
      const password = passwordInput.value;
      if (!username || !password) { setAuthStatus("Enter username and password", true); setAuthModalStatus("Enter username and password.", true); return; }
      if (/\s/.test(rawUsername)) { setAuthStatus("Username cannot contain spaces", true); setAuthModalStatus("Username cannot contain spaces.", true); return; }
      try {
        setAuthStatus("Registering...");
        setAuthModalStatus("Registering...", false);
        const result = await apiFetch("/api/register", { method: "POST", body: JSON.stringify({ username, password, appId: APP_ID }) });
        saveSessionLocally(result.token, result.username || username);
        passwordInput.value = "";
        await loadProgressFromServer();
        setAuthModalStatus("Account created.", false);
        closeAuthOverlay();
      } catch (err) {
        setAuthStatus(err.message || "Register failed", true);
        setAuthModalStatus(err.message || "Register failed", true);
      }

    async function loginUser() {
      const usernameInput = document.getElementById("auth-username");
      const passwordInput = document.getElementById("auth-password");
      const rawUsername = usernameInput.value || "";
      const username = rawUsername.trim().toLowerCase();
      const password = passwordInput.value;
      if (!username || !password) { setAuthStatus("Enter username and password", true); setAuthModalStatus("Enter username and password.", true); return; }
      if (/\s/.test(rawUsername)) { setAuthStatus("Username cannot contain spaces", true); setAuthModalStatus("Username cannot contain spaces.", true); return; }
      try {
        setAuthStatus("Logging in...");
        setAuthModalStatus("Logging in...", false);
        const result = await apiFetch("/api/login", { method: "POST", body: JSON.stringify({ username, password, appId: APP_ID }) });
        saveSessionLocally(result.token, result.username || username);
        passwordInput.value = "";
        await loadProgressFromServer();
        setAuthModalStatus("Logged in.", false);
        closeAuthOverlay();
      } catch (err) {
        setAuthStatus(err.message || "Login failed", true);
        setAuthModalStatus(err.message || "Login failed", true);
      }
    }
    async function loadProgressFromServer() {
      const result = await apiFetch("/api/load?appId=" + encodeURIComponent(APP_ID), { method: "GET" });
      if (result.username) {
        authUsername = result.username;
        localStorage.setItem(SESSION_STORAGE.username, authUsername);
      }
      updateAuthUI();
      await applyProgressPayload(result.saveData || {});
      setSaveStatus("Loaded");
    }
    async function saveProgressToServer() {
      if (!authToken || saveInFlight || isApplyingRemoteData) return;
      saveInFlight = true;
      try {
        await apiFetch("/api/save", { method: "POST", body: JSON.stringify({ appId: APP_ID, saveData: buildProgressPayload() }) });
        setAuthStatus("Logged in as " + (authUsername || "student"));
        setSaveStatus("Saved");
      } catch (err) {
        setAuthStatus(err.message || "Save failed", true);
        setSaveStatus("Save failed");
      } finally {
        saveInFlight = false;
        if (saveQueued) { saveQueued = false; saveProgressToServer(); }
      }
    }
    function queueCloudSave() {
      if (isApplyingRemoteData || !authToken) return;
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => {
        if (saveInFlight) { saveQueued = true; return; }
        setSaveStatus("Saving...");
        saveProgressToServer();
      }, 900);
    }
    async function flushPendingSaveBeforeLogout() {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = null;
      if (!authToken || isApplyingRemoteData) return;
      if (saveInFlight) {
        saveQueued = true;
        while (saveInFlight) await wait(80);
      }
      await saveProgressToServer();
      while (saveInFlight) await wait(80);
    }
    async function logoutUser() {
      try { setSaveStatus("Saving..."); await flushPendingSaveBeforeLogout(); } catch (err) { console.error(err); }
      try {
        if (authToken) await apiFetch("/api/logout", { method: "POST", body: "{}" });
      } catch (err) { console.error(err); }
      const prefill = authUsername || "";
      clearSessionLocally();
      setSaveStatus("Not saved yet");
      openAuthOverlay(prefill);
    }
    function markVisited(pageNum) {
      if (!visitedPages.includes(pageNum)) {
        visitedPages.push(pageNum);
        visitedPages.sort((a, b) => a - b);
      }
      updateProgress();
    }
    function updateProgress() {
      const progressPercent = (visitedPages.length / totalProgressPages) * 100;
      document.getElementById("progress").style.width = progressPercent + "%";
      document.getElementById("progressText").innerText = progressPercent.toFixed(0) + "% completed";
    }
    function updateSubPageBoxesFromStatus() {
      Object.entries(subPageBoxMap).forEach(([key, meta]) => {
        const el = document.getElementById(meta.boxId);
        if (!el) return;
        el.innerHTML = subPageStatus[key] ? "✅" : meta.label;
      });
    }
    function setNavMode(mode) {
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const finishBtn = document.getElementById("finish-btn");
      if (mode === "sub") {
        prevBtn.style.display = "none";
        nextBtn.style.display = "none";
        finishBtn.style.display = "inline-block";
        return;
      }
      finishBtn.style.display = "none";
      prevBtn.style.display = currentPage === 1 ? "none" : "inline-block";
      nextBtn.style.display = currentPage === 23 ? "none" : "inline-block";
    }
    function hideAllPages() {
      mainPages.forEach(n => { const el = document.getElementById("page" + n); if (el) el.classList.remove("active"); });
      subPages.forEach(n => { const el = document.getElementById("page" + n + "_sub"); if (el) el.classList.remove("active"); });
    }
    function renderView(pageNum, isSubPage, shouldMarkVisited = true) {
      hideAllPages();
      if (isSubPage) {
        const subEl = document.getElementById("page" + pageNum + "_sub");
        if (subEl) subEl.classList.add("active");
      } else {
        const mainEl = document.getElementById("page" + pageNum);
        if (mainEl) mainEl.classList.add("active");
      }
      currentPage = pageNum;
      currentIsSubPage = isSubPage;
      updateSubPageBoxesFromStatus();
      if (shouldMarkVisited) markVisited(pageNum);
      else updateProgress();
      setNavMode(isSubPage ? "sub" : "main");
    }
    async function showPage(pageNum, skipTransition = false) {
      if (skipTransition) renderView(pageNum, false, true);
      else await runCanvasTransition(() => renderView(pageNum, false, true));
      queueCloudSave();
    }
    async function showSubPage(pageNum, skipTransition = false) {
      if (skipTransition) renderView(pageNum, true, true);
      else await runCanvasTransition(() => renderView(pageNum, true, true));
      queueCloudSave();
    }
    function pageContainsValue(id, value) {
      const el = document.getElementById(id);
      if (!el) return false;
      return String(el.value || "").toLowerCase().includes(String(value).toLowerCase());
    }
    async function prevPage() {
      if (currentIsSubPage) return;
      const idx = mainPages.indexOf(currentPage);
      if (idx > 0) await showPage(mainPages[idx - 1]);
    }
    async function nextPage() {
      if (currentIsSubPage) return;
      if (currentPage === 3) {
        for (const key of subPages) {
          if (!subPageStatus[key]) { showMessagePopup(WRONG_MESSAGE); return; }
        }
      }
      const validators = {
        13: () => pageContainsValue("answer720_page13", "720"),
        14: () => pageContainsValue("answer468_page14", "468"),
        15: () => pageContainsValue("answer50_page15", "50"),
        16: () => pageContainsValue("answer60_page16", "60"),
        17: () => pageContainsValue("answer400_page17", "400"),
        18: () => pageContainsValue("answer100_page18", "100")
      };
      if (validators[currentPage] && !validators[currentPage]()) { showMessagePopup(WRONG_MESSAGE); return; }
      const idx = mainPages.indexOf(currentPage);
      if (idx < mainPages.length - 1) await showPage(mainPages[idx + 1]);
    }
    async function backFromSubPage() {
      switch (currentPage) {
        case 4: await checkAnswersAndGoBackPage4(); break;
        case 5: await checkAnswersAndGoBackPage5(); break;
        case 6: await checkAnswersAndGoBackPage6(); break;
        case 7: await checkAnswersAndGoBackPage7(); break;
        case 8: await checkAnswersAndGoBackPage8(); break;
        case 9: await checkAnswersAndGoBackPage9(); break;
        case 10: await checkAnswersAndGoBackPage10(); break;
        case 11: await checkAnswersAndGoBackPage11(); break;
      }
    }
    async function finishSubPageIfValid(subNum, isValid) {
      if (!isValid) { showMessagePopup(WRONG_MESSAGE); return; }
      subPageStatus[subNum] = true;
      updateSubPageBoxesFromStatus();
      await showPage(3);
    }
    async function checkAnswersAndGoBackPage4() { await finishSubPageIfValid(4, pageContainsValue("answer80_page4","80") && pageContainsValue("answer138_page4","138")); }
    async function checkAnswersAndGoBackPage5() { await finishSubPageIfValid(5, pageContainsValue("answer84_page5","84") && pageContainsValue("answer136_page5","136")); }
    async function checkAnswersAndGoBackPage6() { await finishSubPageIfValid(6, pageContainsValue("answer360","360") && pageContainsValue("answerTri_page6","tri") && pageContainsValue("answer336","336")); }
    async function checkAnswersAndGoBackPage7() { await finishSubPageIfValid(7, pageContainsValue("answer120","120") && pageContainsValue("answerTri_page7","tri") && pageContainsValue("answer284","284")); }
    async function checkAnswersAndGoBackPage8() { await finishSubPageIfValid(8, pageContainsValue("answer64_page8","64") && pageContainsValue("answer144_page8","144")); }
    async function checkAnswersAndGoBackPage9() { await finishSubPageIfValid(9, pageContainsValue("answer50_page9","50") && pageContainsValue("answer90_page9","90")); }
    async function checkAnswersAndGoBackPage10() { await finishSubPageIfValid(10, pageContainsValue("answer114_page10","114") && pageContainsValue("answerSqu_page10","squ") && pageContainsValue("answer156_page10","156")); }
    async function checkAnswersAndGoBackPage11() { await finishSubPageIfValid(11, pageContainsValue("answerSqu_page11","squ") && pageContainsValue("answer108_page11","108")); }
    async function checkPasswordPage22() {
      const input = document.getElementById("answer5348_page22");
      const ans = (input.value || "").trim();
      if (ans === "5348") {
        input.value = "";
        queueCloudSave();
        window.open(FINAL_UNLOCK_URL, "_blank");
        await showPage(23);
      } else {
        showMessagePopup(ROOF_MESSAGE);
      }
    }
    function exitPdfMode() {
      const roleContainer = document.getElementById("role-container");
      const viewer = document.getElementById("pdfViewer");
      const status = document.getElementById("pdfStatus");
      roleContainer.classList.remove("pdf-mode");
      viewer.style.display = "none";
      viewer.innerHTML = "";
      viewer.scrollTop = 0;
      status.style.display = "none";
      currentPdfUrl = "";
      currentPdfRole = "";
      pdfScrollTop = 0;
    }
    async function renderPdfIntoSecondCanvas(url, roleKey = "", preserveScroll = false) {
      const roleContainer = document.getElementById("role-container");
      const viewer = document.getElementById("pdfViewer");
      const status = document.getElementById("pdfStatus");
      currentPdfUrl = url;
      currentPdfRole = roleKey || "";
      viewer.innerHTML = "";
      viewer.style.display = "block";
      roleContainer.classList.add("pdf-mode");
      status.textContent = "Loading PDF...";
      status.style.display = "block";
      try {
        const loadingTask = pdfjsLib.getDocument({ url });
        const pdf = await loadingTask.promise;
        const targetWidth = 920;
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const viewport1 = page.getViewport({ scale: 1 });
          const scale = targetWidth / viewport1.width;
          const viewport = page.getViewport({ scale });
          const canvas = document.createElement("canvas");
          canvas.className = "pdfPageCanvas";
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          const ctx = canvas.getContext("2d", { alpha: false });
          viewer.appendChild(canvas);
          await page.render({ canvasContext: ctx, viewport }).promise;
        }
        status.style.display = "none";
        viewer.scrollTop = preserveScroll ? pdfScrollTop : 0;
        queueCloudSave();
      } catch (err) {
        console.error("PDF.js render error:", err);
        exitPdfMode();
        showMessagePopup("PDF failed to load in the canvas. Check Console for details.");
      }
    }
    function initSecondCanvasHotspots() {
      document.getElementById("hotspot-officer").addEventListener("click", function () { renderPdfIntoSecondCanvas(ROLE_PDF_URLS.officer, "officer"); });
      document.getElementById("hotspot-professor").addEventListener("click", function () { renderPdfIntoSecondCanvas(ROLE_PDF_URLS.professor, "professor"); });
      document.getElementById("hotspot-hacker").addEventListener("click", function () { renderPdfIntoSecondCanvas(ROLE_PDF_URLS.hacker, "hacker"); });
      document.getElementById("hotspot-video").addEventListener("click", function () { window.open(ROLE_VIDEO_URL, "_blank"); });
      document.getElementById("pdfViewer").addEventListener("scroll", function (e) { pdfScrollTop = e.target.scrollTop; queueCloudSave(); });
    }
    function initOpenFileButton() {
      document.getElementById("openFileBtn").addEventListener("click", function () {
        if (!currentPdfUrl) { showMessagePopup("Pick a role file first."); return; }
        window.open(currentPdfUrl, "_blank");
      });
    }
    function initTranslatorWidget() {
      const widget = document.getElementById("side-widget");
      const collapseBtn = document.getElementById("collapse-widget");
      collapseBtn.addEventListener("click", function (e) { e.stopPropagation(); widget.classList.add("collapsed"); });
      widget.addEventListener("click", function () { if (widget.classList.contains("collapsed")) widget.classList.remove("collapsed"); });
    }
    function initTranslationScreenshotTool() {
      document.getElementById("select-text").addEventListener("click", function () {
        const overlay = document.createElement("div");
        overlay.id = "selection-overlay";
        document.body.appendChild(overlay);
        let startX, startY, selectionBox;
        overlay.addEventListener("mousedown", function (e) {
          startX = e.clientX;
          startY = e.clientY;
          selectionBox = document.createElement("div");
          selectionBox.id = "selection-box";
          selectionBox.style.left = startX + "px";
          selectionBox.style.top = startY + "px";
          selectionBox.style.width = "0px";
          selectionBox.style.height = "0px";
          overlay.appendChild(selectionBox);
          function mouseMoveHandler(e) {
            const currentX = e.clientX;
            const currentY = e.clientY;
            const left = Math.min(startX, currentX);
            const top = Math.min(startY, currentY);
            const width = Math.abs(currentX - startX);
            const height = Math.abs(currentY - startY);
            selectionBox.style.left = left + "px";
            selectionBox.style.top = top + "px";
            selectionBox.style.width = width + "px";
            selectionBox.style.height = height + "px";
          }
          function mouseUpHandler() {
            overlay.removeEventListener("mousemove", mouseMoveHandler);
            overlay.removeEventListener("mouseup", mouseUpHandler);
            const rect = selectionBox.getBoundingClientRect();
            document.body.removeChild(overlay);
            const target = document.getElementById("app-container");
            const targetRect = target.getBoundingClientRect();
            html2canvas(target, { useCORS: true, allowTaint: false }).then(canvas => {
              const scaleFactor = canvas.width / targetRect.width;
              const sx = (rect.left - targetRect.left) * scaleFactor;
              const sy = (rect.top - targetRect.top) * scaleFactor;
              const sWidth = rect.width * scaleFactor;
              const sHeight = rect.height * scaleFactor;
              const croppedCanvas = document.createElement("canvas");
              croppedCanvas.width = sWidth;
              croppedCanvas.height = sHeight;
              const ctx = croppedCanvas.getContext("2d");
              ctx.drawImage(canvas, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);
              croppedCanvas.toBlob(blob => {
                if (!blob) return;
                const item = new ClipboardItem({ "image/png": blob });
                navigator.clipboard.write([item]).then(() => {
                  showMessagePopup("Screenshot copied to clipboard.");
                }).catch(err => {
                  console.error("Failed to copy screenshot to clipboard", err);
                  showMessagePopup("Failed to copy screenshot to clipboard.");
                });
              });
            });
          }
          overlay.addEventListener("mousemove", mouseMoveHandler);
          overlay.addEventListener("mouseup", mouseUpHandler);
        });
      });
    }
    function initCloudSaveInputs() {
      getAnswerInputs().forEach(input => {
        input.addEventListener("input", function () { queueCloudSave(); });
      });
    }
    function showTutorial() {
      const alreadySeen = localStorage.getItem(TUTORIAL_STORAGE_KEY);
      if (alreadySeen === "yes") { maybeRequireAuthOverlay(); return; }
      tutorialIndex = 0;
      document.getElementById("tutorialImage").src = TUTORIAL_IMAGES[tutorialIndex];
      document.getElementById("tutorialOverlay").style.display = "flex";
    }
    function nextTutorialSlide() {
      tutorialIndex++;
      if (tutorialIndex >= TUTORIAL_IMAGES.length) {
        document.getElementById("tutorialOverlay").style.display = "none";
        localStorage.setItem(TUTORIAL_STORAGE_KEY, "yes");
        maybeRequireAuthOverlay();
        return;
      }
      document.getElementById("tutorialImage").src = TUTORIAL_IMAGES[tutorialIndex];
    }
    function initTutorial() {
      document.getElementById("tutorialNext").addEventListener("click", nextTutorialSlide);
      TUTORIAL_IMAGES.forEach(url => { const pre = new Image(); pre.src = url; });
      showTutorial();
    }

    document.addEventListener("DOMContentLoaded", async function () {
      restoreSessionLocally();
      initSecondCanvasHotspots();
      initOpenFileButton();
      initTranslatorWidget();
      initTranslationScreenshotTool();
      initCloudSaveInputs();
      document.getElementById("introBtn").addEventListener("click", openIntro);
      document.getElementById("authRegisterBtn").addEventListener("click", registerUser);
      document.getElementById("authLoginBtn").addEventListener("click", loginUser);
      document.getElementById("logoutBtn").addEventListener("click", logoutUser);
      document.getElementById("prev-btn").addEventListener("click", prevPage);
      document.getElementById("next-btn").addEventListener("click", nextPage);
      document.getElementById("finish-btn").addEventListener("click", backFromSubPage);
      document.getElementById("auth-password").addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); loginUser(); }
      });
      renderView(currentPage, false, true);
      if (authToken) {
        try {
          await loadProgressFromServer();
        } catch (err) {
          console.error(err);
          clearSessionLocally();
          renderView(1, false, true);
        }
      }
      initTutorial();
    });
  </script>
